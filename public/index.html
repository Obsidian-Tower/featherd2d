<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeatherD2D Map</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    let map;
    let userMarker = null;
    let userAccuracyCircle = null;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 29.187, lng: -82.140 },
        zoom: 16,
        gestureHandling: "greedy",
        mapTypeId: "hybrid",
        styles: [
          { featureType: "poi", stylers: [{ visibility: "off" }] },
          { featureType: "transit", stylers: [{ visibility: "off" }] }
        ]
      });

      getUserLocation();
    }

    function getUserLocation() {
      if (!navigator.geolocation) {
        console.warn("Geolocation not supported");
        return;
      }

      navigator.geolocation.watchPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          const userLatLng = { lat, lng };

          if (!userMarker) {
            userMarker = new google.maps.Marker({
              position: userLatLng,
              map: map,
              title: "You are here",
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 6,
                fillColor: "#2563eb",
                fillOpacity: 1,
                strokeWeight: 2,
                strokeColor: "#000"
              }
            });

            userAccuracyCircle = new google.maps.Circle({
              center: userLatLng,
              radius: accuracy,
              map: map,
              fillColor: "#2563eb",
              fillOpacity: 0.15,
              strokeColor: "#2563eb",
              strokeOpacity: 0.4,
              strokeWeight: 1
            });

            map.setCenter(userLatLng);
          } else {
            userMarker.setPosition(userLatLng);
            userAccuracyCircle.setCenter(userLatLng);
            userAccuracyCircle.setRadius(accuracy);
          }
        },
        (error) => {
          console.error("Geolocation error:", error);
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 5000
        }
      );
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBGFCA70J_CRFo-FxwoSpN3ZjpMicNeVfM&callback=initMap">
  </script>
</body>
</html>
