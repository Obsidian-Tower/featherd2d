<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeatherD2D Map</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      position: fixed;
      width: 100%;
      font-family: sans-serif;
    }

    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .layer-panel {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 12px;
      border-radius: 10px;
      max-height: 300px;
      overflow: auto;
      min-width: 220px;
    }

    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .color-box {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex: 0 0 12px;
    }

    #uiToggleWrapper {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 9999;
      transform: scale(1);
      transform-origin: bottom left;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #444;
      border-radius: 34px;
      transition: 0.3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 22px;
      width: 22px;
      left: 3px;
      top: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #16a34a;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .ui-group {
      transition: opacity 0.25s ease;
    }

    .user-badge {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      pointer-events: none;
    }

    .layer-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .layer-label {
      white-space: nowrap;
    }

    .empty-state {
      opacity: 0.7;
      font-size: 13px;
    }
        .notes-container {
      display: flex;
      flex-direction: column;
      height: 110px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #ffffff;
      overflow: hidden;
    }

    .notes-thread {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #f9fafb;
    }

    .note-row {
      display: flex;
      justify-content: flex-start;
      width: 100%;
    }

    .note-bubble {
      max-width: 70%;
      padding: 6px 8px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.3;
    }

    .note-left {
      justify-content: flex-start;
    }

    .note-left .note-bubble {
      background: #e5e7eb;
      color: #111827;
    }

    .note-meta {
      font-size: 10px;
      opacity: 0.6;
      color: #374151;
    }

    .notes-input {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 6px;
      background: #ffffff;
    }

    .notes-input input {
      flex: 1;
      min-width: 0;
      padding: 6px;
      border: none;
      outline: none;
      font-size: 12px;
      background: #ffffff;
      color: #111827;
    }

    .notes-input button {
      padding: 6px 10px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .gm-ui-hover-effect {
      display: none !important;
    }

    .gm-style .gm-style-iw-c {
      padding: 0 !important;
      border-radius: 8px !important;
    }

    .gm-style .gm-style-iw-d {
      padding: 0 !important;
      margin: 0 !important;
      overflow: hidden !important;
    }

    .gm-style .gm-style-iw {
      padding: 0 !important;
    }

    #clusterToggleWrapper {
      position: absolute;
      bottom: 54px;
      left: 12px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 8px 10px;
      border-radius: 10px;
      transform: scale(1);
      transform-origin: bottom left;
    }

    .toggle-label {
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="clusterToggleWrapper" class="ui-group">
    <span class="toggle-label">Cluster</span>
    <label class="switch">
      <input type="checkbox" id="clusterToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div id="uiToggleWrapper">
    <label class="switch">
      <input type="checkbox" id="uiToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="userBadge" class="user-badge ui-group" style="display:none;"></div>

  <div class="layer-panel ui-group">
    <div class="layer-title">Areas</div>
    <div id="layerList">
      <div class="empty-state">Loading…</div>
    </div>
  </div>

  <script>
    let propertyMarkers = [];
    let markerCluster = null;
    let clusteringEnabled = true;
    let map;
    let userMarker = null;
    let userAccuracyCircle = null;
    let activeInfoWindow = null;
    let CURRENT_USER = null;
    let ACTIVE_POLYGONS = new Set();
    let polygons = [];
    const STATUS_COLORS = {
      "prospect": "#facc15",
      "knocked": "#a855f7",
      "not interested": "#06b7d6",
      "follow up": "#0419ba",
      "sold": "#08a112",
      "installed": "#07ed0f",
      "vacant": "#fc7447"
    };
    function getUserFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("user");
    }

    function renderNote(notesThread, note) {
      const isMe = note.user === CURRENT_USER;

      const row = document.createElement("div");
      row.className = "note-row note-left";

      const bubbleWrap = document.createElement("div");

      const meta = document.createElement("div");
      meta.className = "note-meta";
      meta.textContent = `${note.user} - ${new Date(note.created_at).toLocaleTimeString()}`;
      bubbleWrap.appendChild(meta);

      const bubble = document.createElement("div");
      bubble.className = "note-bubble";

      if (isMe) {
        bubble.style.background = "#2563eb";
        bubble.style.color = "white";
      } else {
        bubble.style.background = "#e5e7eb";
        bubble.style.color = "#111827";
      }

      bubble.textContent = note.note;

      bubbleWrap.appendChild(bubble);
      row.appendChild(bubbleWrap);
      notesThread.appendChild(row);
    }
    
    function getRandomColor() {
      const colors = ["#ef4444", "#22c55e", "#3b82f6", "#f59e0b", "#a855f7", "#14b8a6"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

        function clearMarkerCluster() {
      if (markerCluster) {
        markerCluster.clearMarkers();
        markerCluster = null;
      }
    }

    function syncMarkerDisplay() {
      clearMarkerCluster();

      if (!propertyMarkers.length) return;

      if (clusteringEnabled) {
        propertyMarkers.forEach(marker => marker.setMap(null));
        markerCluster = new markerClusterer.MarkerClusterer({
          map,
          markers: propertyMarkers
        });
      } else {
        propertyMarkers.forEach(marker => marker.setMap(map));
      }
    }

    function applyUIToggle(visible) {
      document.querySelectorAll(".ui-group").forEach(el => {
        el.style.opacity = visible ? "1" : "0";
        el.style.pointerEvents = visible ? "auto" : "none";
      });
    }

    async function fetchActivePolygons() {
      try {
        const res = await fetch(
          `https://featherd2d.coryzuber.workers.dev/get-active-polygons?user=${encodeURIComponent(CURRENT_USER)}`
        );
        const data = await res.json();

        if (!res.ok) {
          console.error("Failed to fetch active polygons:", data);
          return;
        }

        ACTIVE_POLYGONS = new Set(data.active_polygons || []);
        console.log("✅ Active polygons:", ACTIVE_POLYGONS);
      } catch (err) {
        console.error("❌ fetchActivePolygons error:", err);
      }
    }

    async function updateActivePolygons() {
      try {
        const list = Array.from(ACTIVE_POLYGONS);

        await fetch("https://featherd2d.coryzuber.workers.dev/update-active-polygons", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user: CURRENT_USER,
            active_polygons: list
          })
        });

        console.log("✅ Active polygons updated:", list);
      } catch (err) {
        console.error("❌ updateActivePolygons error:", err);
      }
    }

    async function refreshPropertiesForActivePolygons() {
      try {
        // 🔥 clear existing markers
        clearMarkerCluster();
        propertyMarkers.forEach(marker => marker.setMap(null));
        propertyMarkers = [];

        // 🔥 get properties inside active polygons
        const res = await fetch("https://featherd2d.coryzuber.workers.dev/get-properties-for-active-polygons", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user: CURRENT_USER })
        });

        const data = await res.json();

        if (!res.ok) {
          console.error("❌ Failed to fetch properties:", data);
          return;
        }

        const properties = Array.isArray(data.properties) ? data.properties : [];

        if (!properties.length) return;

        // 🔥 fetch disposition history (latest per property)
        const propertyIds = properties.map(p => p.property_id);

        const statusRes = await fetch("https://featherd2d.coryzuber.workers.dev/get-property-dispositions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ property_ids: propertyIds })
        });

        const statuses = await statusRes.json();

        const statusMap = {};
        if (Array.isArray(statuses)) {
          statuses.forEach(s => {
            statusMap[s.property_id] = s.disposition;
          });
        }

        // 🔥 helper (copied from large file logic)
        function getAddressNumber(address) {
          if (!address) return null;
          const match = address.trim().match(/^(\d+)/);
          return match ? match[1] : null;
        }


        // 🔥 create markers
        properties.forEach(row => {
          if (typeof row.lat !== "number" || typeof row.lng !== "number") return;

          const status = statusMap[row.property_id];
          row.current_status = status || "prospect";
          const fillColor = STATUS_COLORS[row.current_status] || "#ffffff";
          const textColor = status ? "#ffffff" : "#000000";

          const addressNumber = getAddressNumber(row.PHY_ADDR1);

          const marker = new google.maps.Marker({
            position: { lat: row.lat, lng: row.lng },
            map: clusteringEnabled ? null : map,

            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 15,
              fillColor: fillColor,
              fillOpacity: 1,
              strokeWeight: 1,
              strokeColor: "#000"
            },

            ...(addressNumber && {
              label: {
                text: addressNumber,
                color: textColor,
                fontSize: "12px",
                fontWeight: "600"
              }
            })
          });

                    marker.addListener("click", () => {
            if (activeInfoWindow) activeInfoWindow.close();

            const container = document.createElement("div");
            container.style.padding = "5px";
            container.style.margin = "0";
            container.style.fontSize = "13px";

            // =========================
            // NOTES / CHAT MODULE
            // =========================
            const notesContainer = document.createElement("div");
            notesContainer.className = "notes-container";

            const notesThread = document.createElement("div");
            notesThread.className = "notes-thread";
            notesThread.innerHTML = "";
            (async () => {
              try {
                const res = await fetch("https://featherd2d.coryzuber.workers.dev/get-notes", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    property_ids: [row.property_id]
                  })
                });

                const notes = await res.json();
                if (!Array.isArray(notes)) return;

                notes.forEach(note => renderNote(notesThread, note));
                notesThread.scrollTop = notesThread.scrollHeight;
              } catch (err) {
                console.error("Failed to load notes:", err);
              }
            })();

            const inputRow = document.createElement("div");
            inputRow.className = "notes-input";

            const focusTrap = document.createElement("div");
            focusTrap.setAttribute("tabindex", "0");
            focusTrap.style.position = "absolute";
            focusTrap.style.opacity = "0";
            focusTrap.style.height = "0";
            focusTrap.style.width = "0";
            focusTrap.style.pointerEvents = "none";

            const input = document.createElement("input");
            input.placeholder = "Add note...";

            const sendBtn = document.createElement("button");
            sendBtn.textContent = "Send";

            sendBtn.onclick = async () => {
              const text = input.value.trim();
              if (!text) return;

              input.disabled = true;
              sendBtn.disabled = true;
              sendBtn.textContent = "Sending...";

              try {
                const res = await fetch("https://featherd2d.coryzuber.workers.dev/add-note", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    property_id: row.property_id,
                    user: CURRENT_USER,
                    note: text
                  })
                });

                const data = await res.json();

                if (res.ok && data?.note) {
                  renderNote(notesThread, data.note);
                  input.value = "";
                  notesThread.scrollTop = notesThread.scrollHeight;
                } else {
                  console.error("Add note failed:", data);
                }
              } catch (err) {
                console.error("Add note error:", err);
              } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                sendBtn.textContent = "Send";
              }
            };

            inputRow.appendChild(focusTrap);
            inputRow.appendChild(input);
            inputRow.appendChild(sendBtn);

            notesContainer.appendChild(notesThread);
            notesContainer.appendChild(inputRow);
            container.appendChild(notesContainer);

            // =========================
            // ADDRESS BUTTON WITH COPY
            // =========================
            const addressRow = document.createElement("div");
            addressRow.style.marginBottom = "4px";

            const addressBtn = document.createElement("button");
            addressBtn.style.display = "flex";
            addressBtn.style.alignItems = "center";
            addressBtn.style.justifyContent = "space-between";
            addressBtn.style.width = "100%";
            addressBtn.style.background = "#f3f4f6";
            addressBtn.style.border = "1px solid #374151";
            addressBtn.style.borderRadius = "6px";
            addressBtn.style.padding = "6px 8px";
            addressBtn.style.cursor = "pointer";
            addressBtn.style.color = "#111";
            addressBtn.style.fontSize = "14px";

            const addressText = document.createElement("span");
            addressText.textContent = row.PHY_ADDR1 || "No Address";
            addressText.style.textAlign = "left";
            addressText.style.flex = "1";

            const copyIcon = document.createElement("div");
            copyIcon.style.width = "16px";
            copyIcon.style.height = "16px";
            copyIcon.style.position = "relative";
            copyIcon.style.marginLeft = "8px";

            copyIcon.innerHTML = `
              <div style="
                position:absolute;
                width:12px;
                height:12px;
                border:1px solid #374151;
                top:2px;
                left:2px;
                background:white;
              "></div>
              <div style="
                position:absolute;
                width:12px;
                height:12px;
                border:1px solid #374151;
                top:0;
                left:0;
                background:white;
              "></div>
            `;

            addressBtn.onclick = async () => {
              try {
                await navigator.clipboard.writeText(row.PHY_ADDR1 || "");
                addressBtn.style.background = "#d1fae5";
                setTimeout(() => {
                  addressBtn.style.background = "#f3f4f6";
                }, 600);
              } catch (err) {
                console.error("Copy failed:", err);
              }
            };

            addressBtn.appendChild(addressText);
            addressBtn.appendChild(copyIcon);
            addressRow.appendChild(addressBtn);
            container.appendChild(addressRow);

            // =========================
            // CITY + OWNER
            // =========================
            const cityDiv = document.createElement("div");
            cityDiv.textContent = row.PHY_CITY || "";
            container.appendChild(cityDiv);

            const ownerDiv = document.createElement("div");
            ownerDiv.style.marginTop = "6px";
            ownerDiv.textContent = `Owner: ${row.owner || row.OWN_NAME || "Unknown"}`;
            container.appendChild(ownerDiv);

            // =========================
            // STATUS BUTTONS
            // =========================
            const btnWrap = document.createElement("div");
            btnWrap.style.display = "flex";
            btnWrap.style.flexWrap = "wrap";
            btnWrap.style.gap = "6px";
            btnWrap.style.marginTop = "8px";

            Object.keys(STATUS_COLORS).forEach(status => {
              const btn = document.createElement("button");

              btn.textContent = status;
              btn.style.padding = "6px 8px";
              btn.style.border = "none";
              btn.style.borderRadius = "6px";
              btn.style.cursor = "pointer";
              btn.style.fontSize = "13px";
              btn.style.color = "white";
              btn.style.background = STATUS_COLORS[status];

              if (row.current_status === status) {
                btn.style.outline = "2px solid white";
              }

              btn.onclick = async () => {
                if (row.current_status === status) return;

                try {
                  const res = await fetch("https://featherd2d.coryzuber.workers.dev/update-property-disposition", {
                    method: "POST",
                    headers: {
                      "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                      property_id: row.property_id,
                      user: CURRENT_USER,
                      disposition: status
                    })
                  });

                  const data = await res.json();

                  if (!res.ok || !data.success) {
                    console.error("Backend rejected update:", data);
                    return;
                  }

                  marker.setIcon({
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 15,
                    fillColor: STATUS_COLORS[status],
                    fillOpacity: 1,
                    strokeWeight: 1,
                    strokeColor: "#000"
                  });

                  if (marker.getLabel()) {
                    marker.setLabel({
                      ...marker.getLabel(),
                      color: "#ffffff"
                    });
                  }

                  row.current_status = status;

                  btnWrap.querySelectorAll("button").forEach(b => b.style.outline = "none");
                  btn.style.outline = "2px solid white";
                } catch (err) {
                  console.error("Network error:", err);
                }
              };

              btnWrap.appendChild(btn);
            });

            container.appendChild(btnWrap);

            // =========================
            // META BLOCK
            // =========================
            const meta = document.createElement("div");
            meta.style.marginTop = "10px";
            meta.style.fontSize = "12px";
            meta.style.opacity = "0.85";

            meta.innerHTML = `
              <div><b>Property ID:</b> ${row.property_id}</div>
              <div><b>Status:</b> ${row.current_status || "prospect"}</div>
            `;

            container.appendChild(meta);

            activeInfoWindow = new google.maps.InfoWindow({
              content: container
            });

            activeInfoWindow.open(map, marker);
          });
          propertyMarkers.push(marker);
        });
        syncMarkerDisplay();
        console.log(`✅ Rendered ${propertyMarkers.length} markers`);

      } catch (err) {
        console.error("❌ refreshPropertiesForActivePolygons error:", err);
      }
    }

    function addLayerUI(polyObj) {
      const list = document.getElementById("layerList");

      if (list.querySelector(".empty-state")) {
        list.innerHTML = "";
      }

      const item = document.createElement("div");
      item.className = "layer-item";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.dataset.id = polyObj.id;
      checkbox.checked = ACTIVE_POLYGONS.has(polyObj.id);

      const colorBox = document.createElement("div");
      colorBox.className = "color-box";
      colorBox.style.background = polyObj.color;

      const label = document.createElement("span");
      label.className = "layer-label";
      label.textContent = polyObj.name || `area-${polyObj.id}`;

      checkbox.addEventListener("change", async () => {
        const visible = checkbox.checked;

        polyObj.visible = visible;
        polyObj.polygon.setMap(visible ? map : null);

        if (visible) {
          ACTIVE_POLYGONS.add(polyObj.id);
        } else {
          ACTIVE_POLYGONS.delete(polyObj.id);
        }

        await updateActivePolygons();
        await refreshPropertiesForActivePolygons();
      });

      item.appendChild(checkbox);
      item.appendChild(colorBox);
      item.appendChild(label);
      list.appendChild(item);
    }

    function applyActiveStateToUI() {
      polygons.forEach(polyObj => {
        const isActive = ACTIVE_POLYGONS.has(polyObj.id);

        polyObj.visible = isActive;
        polyObj.polygon.setMap(isActive ? map : null);
      });

      const checkboxes = document.querySelectorAll("#layerList input[type='checkbox']");
      checkboxes.forEach(cb => {
        const id = Number(cb.dataset.id);
        cb.checked = ACTIVE_POLYGONS.has(id);
      });
    }

    async function fetchAllPolygons() {
      try {
        const res = await fetch("https://featherd2d.coryzuber.workers.dev/get-polygons");
        const data = await res.json();

        if (!res.ok) {
          console.error("❌ Failed to fetch polygons:", data);
          return;
        }

        console.log("✅ ALL POLYGONS:", data);

        polygons.forEach(p => p.polygon?.setMap(null));
        polygons = [];
        document.getElementById("layerList").innerHTML = '<div class="empty-state">Loading…</div>';

        data.forEach(row => {
          const color = getRandomColor();

          const path = row.coords.map(([lat, lng]) =>
            new google.maps.LatLng(lat, lng)
          );

          const polygon = new google.maps.Polygon({
            paths: path,
            strokeColor: color,
            fillColor: color,
            fillOpacity: 0.2,
            strokeWeight: 2,
            map: null,
            clickable: false
          });

          const polyObj = {
            id: row.id,
            name: row.name,
            polygon,
            path,
            color,
            visible: false
          };

          polygons.push(polyObj);
          addLayerUI(polyObj);
        });

        if (!polygons.length) {
          document.getElementById("layerList").innerHTML = '<div class="empty-state">No areas found.</div>';
        }
      } catch (err) {
        console.error("❌ fetchAllPolygons error:", err);
        document.getElementById("layerList").innerHTML = '<div class="empty-state">Failed to load areas.</div>';
      }
    }

    function showCurrentUser() {
      const badge = document.getElementById("userBadge");
      badge.textContent = `User: ${CURRENT_USER}`;
      badge.style.display = "block";
    }

    function showUserSelectionModal() {
      const overlay = document.createElement("div");
      overlay.style.position = "fixed";
      overlay.style.top = "0";
      overlay.style.left = "0";
      overlay.style.width = "100%";
      overlay.style.height = "100%";
      overlay.style.background = "rgba(0,0,0,0.85)";
      overlay.style.display = "flex";
      overlay.style.alignItems = "center";
      overlay.style.justifyContent = "center";
      overlay.style.zIndex = "99999";

      const box = document.createElement("div");
      box.style.background = "#111";
      box.style.padding = "30px";
      box.style.borderRadius = "12px";
      box.style.textAlign = "center";
      box.style.color = "white";
      box.style.minWidth = "250px";

      const title = document.createElement("div");
      title.textContent = "Select User";
      title.style.marginBottom = "20px";
      title.style.fontSize = "18px";
      title.style.fontWeight = "600";

      box.appendChild(title);

      const users = ["Cory", "James", "Rashaun", "Edward"];

      users.forEach(user => {
        const btn = document.createElement("button");
        btn.textContent = user;
        btn.style.display = "block";
        btn.style.width = "100%";
        btn.style.marginBottom = "10px";
        btn.style.padding = "10px";
        btn.style.borderRadius = "8px";
        btn.style.border = "none";
        btn.style.cursor = "pointer";
        btn.style.background = "#2563eb";
        btn.style.color = "white";

        btn.onclick = () => {
          const url = new URL(window.location.href);
          url.searchParams.set("user", user);
          window.location.href = url.toString();
        };

        box.appendChild(btn);
      });

      overlay.appendChild(box);
      document.body.appendChild(overlay);
    }

    function getUserLocation() {
      if (!navigator.geolocation) {
        console.warn("Geolocation not supported");
        return;
      }

      navigator.geolocation.watchPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;
          const userLatLng = { lat, lng };

          if (!userMarker) {
            userMarker = new google.maps.Marker({
              position: userLatLng,
              map: map,
              title: `${CURRENT_USER || "User"} is here`,
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 6,
                fillColor: "#2563eb",
                fillOpacity: 1,
                strokeWeight: 2,
                strokeColor: "#000"
              }
            });

            userAccuracyCircle = new google.maps.Circle({
              center: userLatLng,
              radius: accuracy,
              map: map,
              fillColor: "#2563eb",
              fillOpacity: 0.15,
              strokeColor: "#2563eb",
              strokeOpacity: 0.4,
              strokeWeight: 1
            });

            map.setCenter(userLatLng);
          } else {
            userMarker.setPosition(userLatLng);
            userAccuracyCircle.setCenter(userLatLng);
            userAccuracyCircle.setRadius(accuracy);
          }
        },
        (error) => {
          console.error("Geolocation error:", error);
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 5000
        }
      );
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 29.187, lng: -82.140 },
        zoom: 16,
        mapTypeId: "hybrid",

        // 🔥 THIS ENABLES VECTOR MAP
        mapId: "d31238cbcfbf2e0f5cb7fe95",

        gestureHandling: "greedy",
        tilt: 0,
        rotateControl: true,
        isFractionalZoomEnabled: true,

        styles: [
          { featureType: "poi", stylers: [{ visibility: "off" }] },
          { featureType: "transit", stylers: [{ visibility: "off" }] }
        ]
      });

      const forceTopDown = () => {
        if (map.getTilt && map.getTilt() !== 0) {
          map.setTilt(0);
        }
        
      };

      forceTopDown();
      map.addListener("zoom_changed", forceTopDown);
      map.addListener("idle", forceTopDown);
      map.addListener("maptypeid_changed", forceTopDown);

      map.addListener("click", () => {
        if (activeInfoWindow) {
          activeInfoWindow.close();
          activeInfoWindow = null;
        }
      });

      const toggle = document.getElementById("uiToggle");
      applyUIToggle(false);

      toggle.addEventListener("change", (e) => {
        applyUIToggle(e.target.checked);
      });

      const clusterToggle = document.getElementById("clusterToggle");
      clusterToggle.checked = clusteringEnabled;

      clusterToggle.addEventListener("change", (e) => {
        clusteringEnabled = e.target.checked;
        syncMarkerDisplay();
      });

      const urlUser = getUserFromURL();

      if (urlUser) {
        CURRENT_USER = urlUser;
        showCurrentUser();

        fetchAllPolygons().then(() => {
          fetchActivePolygons().then(async () => {
            applyActiveStateToUI();
            await refreshPropertiesForActivePolygons();
            getUserLocation();
          });
        });
      } else {
        showUserSelectionModal();
      }
    }
  </script>
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBGFCA70J_CRFo-FxwoSpN3ZjpMicNeVfM&callback=initMap">
  </script>
</body>
</html>
